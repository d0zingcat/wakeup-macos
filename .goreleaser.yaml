version: 2

project_name: wakeup

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: wakeup
    main: ./cmd/wakeup/
    binary: wakeup
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  - id: default
    format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    files:
      - none*

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

release:
  github:
    owner: d0zingcat
    name: wakeup-macos
  draft: false
  prerelease: auto
  name_template: "{{ .Tag }}"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^ci:"
