# Wakeup daemon configuration
# Copy to /etc/wakeup/config.toml (for daemon) or ~/.config/wakeup/config.toml (for CLI)

# Cloudflare Worker URL (without trailing slash)
worker_url = "https://wakeup-worker.YOUR_SUBDOMAIN.workers.dev"

# Auth token (must match AUTH_TOKEN in wrangler.toml)
token = "CHANGE_ME_TO_A_RANDOM_TOKEN"

# Unique device identifier for this Mac
# Examples: "office", "home-mini", "home-mbp"
device_id = "my-mac"

# --- Remote config (v0.3.0+) ---
# The fields below can be managed remotely via the Worker.
# If remote config is set, it overrides local values (except worker_url, token, device_id).
# Priority: local file < environment variables < remote global < remote device
#
# During installation, the installer automatically checks the Worker for remote config.
# If found, remote values are applied and written to local config files.
# If not found, the installer prompts for each setting interactively.
#
# Minimal config: only worker_url, token, and device_id are required.
# Other settings will be pulled from the Worker on each check.
#
# Manage remote config with:
#   wakeup config push              # push local config as global remote config
#   wakeup config push --device X   # push as device-specific config
#   wakeup config get               # view remote global config
#   wakeup config show              # view effective merged config with sources

# How often to check for wake signals (daemon only)
# This is the fallback interval; see ac/battery intervals below
check_interval = "15m"

# Adaptive check intervals based on power state (v0.2.0+)
# On AC power: shorter interval for faster wake response
ac_check_interval = "2m"
# On battery: longer interval to preserve battery life
battery_check_interval = "15m"

# Darkwake detection (v0.2.1+, experimental)
# When enabled, the daemon detects system wake events (including darkwake)
# via wall clock time jumps and checks for signals opportunistically.
# This can reduce effective latency below the check interval.
# enable_darkwake_detection = false
# wake_detect_interval = "30s"

# Default duration to stay awake when a wake signal is received
default_duration = "30m"
